<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑滑石 MgO-SiO₂(-C-H₂O) 物相-应用体系树</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f8f9fa; display: flex; height: 100vh; }
#tree-panel { flex: 0 0 55%; overflow: auto; border-right: 1px solid #dee2e6; background: white; }
#detail-panel { flex: 1; overflow-y: auto; padding: 24px; background: #f8f9fa; }
#detail-panel h2 { margin-bottom: 12px; color: #2c3e50; font-size: 20px; }
#detail-panel .section { margin-bottom: 20px; }
#detail-panel .section h3 { color: #34495e; font-size: 15px; margin-bottom: 8px; border-bottom: 2px solid #3498db; padding-bottom: 4px; }
#detail-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
#detail-panel th { background: #34495e; color: white; padding: 6px 10px; text-align: left; font-weight: 500; }
#detail-panel td { padding: 6px 10px; border-bottom: 1px solid #dee2e6; }
#detail-panel tr:hover td { background: #e8f4f8; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin: 2px; }
.tag-raw { background: #2c3e50; color: white; }
.tag-phase { background: #bdc3c7; color: #2c3e50; }
.tag-product { background: #27ae60; color: white; }
.tag-byproduct { background: #95a5a6; color: white; }
.node circle { fill: #fff; stroke: #34495e; stroke-width: 2px; cursor: pointer; r: 7; }
.node.raw-material circle { fill: #2c3e50; stroke: #1a252f; r: 9; }
.node.intermediate-phase circle { fill: #ecf0f1; stroke: #34495e; }
.node.product circle { fill: #27ae60; stroke: #1e8449; stroke-width: 3px; }
.node.byproduct circle { fill: #95a5a6; stroke: #7f8c8d; }
.node text { font-size: 11px; font-family: "Microsoft YaHei", sans-serif; }
.link { fill: none; stroke: #bdc3c7; stroke-width: 1.5px; }
.link.process { stroke: #e74c3c; }
.link.property_link { stroke: #2980b9; stroke-dasharray: 6 3; }
.edge-label { font-size: 9px; fill: #7f8c8d; }
.empty-state { color: #95a5a6; text-align: center; margin-top: 60px; font-size: 16px; }
.paper-badge { display: inline-block; background: #3498db; color: white; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin: 1px; }
.tree-header { position: absolute; top: 10px; left: 60px; font-size: 14px; color: #7f8c8d; }
</style>
</head>
<body>
<div id="tree-panel">
  <svg width="100%" height="100%"></svg>
</div>
<div id="detail-panel"><div class="empty-state">点击节点查看详情</div></div>
<script>
// ===== DATA =====
const TREE_DATA = {"meta": {"name": "黑滑石 MgO-SiO₂(-C-H₂O) 物相-应用体系树", "version": "0.1.2", "last_updated": "2026-06-28", "description": "以黑滑石原矿为根，按工艺条件分支到各物相，再按性质连接到应用产品"}, "nodes": {"dehydrated_talc": {"id": "dehydrated_talc", "name": "脱水滑石", "name_en": "Dehydrated Talc", "formula": "Mg₃Si₄O₁₀(OH)₂ (H₂O 脱除)", "type": "intermediate_phase", "depth": 1, "children": [], "parents": ["raw_black_talc"], "properties": [{"property": "脱水温度区间", "value": "30-165°C", "condition": "空气气氛，10°C/min 升温", "source_papers": ["PAPER-005"]}, {"property": "质量损失（脱水阶段）", "value": "0.32%", "condition": "30-165°C", "source_papers": ["PAPER-005"]}], "notes": "吸附水脱除，d(006) 未减小→仅表面水，未进入层间", "source_papers": ["PAPER-005"], "papers_cross_validated": ["PAPER-002"]}, "decarbonized_talc": {"id": "decarbonized_talc", "name": "脱碳滑石", "name_en": "Decarbonized Talc", "formula": "Mg₃Si₄O₁₀(OH)₂ (有机碳氧化)", "type": "intermediate_phase", "depth": 1, "children": [], "parents": ["raw_black_talc"], "properties": [{"property": "有机碳氧化温度区间", "value": "165-580°C", "condition": "空气气氛", "source_papers": ["PAPER-005"]}, {"property": "CO₂ 释放峰值", "value": "600°C (MS m/z=44)", "condition": "TG-MS 在线检测", "source_papers": ["PAPER-005"]}, {"property": "白度变化", "value": "显著增加（有机碳氧化）", "condition": "T > 500°C", "source_papers": ["PAPER-005"]}], "notes": "DSC 336.7°C 弱吸热谷，d(006) 从 0.313nm→0.315nm（CO₂逸出撑开层间距）", "source_papers": ["PAPER-005"], "papers_cross_validated": ["PAPER-002"]}, "dehydroxylated_talc": {"id": "dehydroxylated_talc", "name": "脱羟基滑石（非晶化）", "name_en": "Dehydroxylated Talc (Amorphized)", "formula": "Mg₃Si₄O₁₁ (非晶/半晶)", "type": "intermediate_phase", "depth": 1, "children": [], "parents": ["raw_black_talc"], "properties": [{"property": "脱羟基起始温度", "value": "800°C", "condition": "空气气氛", "source_papers": ["PAPER-005"], "notes": "低于普通滑石(850-900°C)——节能优势的定量证据"}, {"property": "相对结晶度 CI", "value": "75.8% → 51.0% (T800→T900)", "condition": "in-situ XRD", "source_papers": ["PAPER-005"]}, {"property": "BET 比表面积变化", "value": "18.8 → 15.0 m²/g (原矿→T800)", "condition": "空气气氛", "source_papers": ["PAPER-005"]}, {"property": "无定形 SiO₂/MgO 含量", "value": ">800°C 后显著增加", "condition": "H₂SO₄/NaOH 分别浸取+ICP", "source_papers": ["PAPER-005"]}, {"property": "活化窗口", "value": "800-900°C", "condition": "保持层状结构+介孔，同时无定形含量增加", "source_papers": ["PAPER-005"], "notes": "表面功能化改性的最佳煅烧区间"}], "notes": "FTIR: O-H 伸缩 3676→3666 cm⁻¹ 红移，Si-O-Si 1017→1000 cm⁻¹ 红移", "source_papers": ["PAPER-005"], "papers_cross_validated": ["PAPER-002"]}, "enstatite_from_talc": {"id": "enstatite_from_talc", "name": "顽火辉石（滑石热解产物）", "name_en": "Enstatite (from Talc Decomposition)", "formula": "MgSiO₃", "type": "intermediate_phase", "depth": 1, "children": ["5g_ceramic", "refractory", "filler_coating"], "parents": ["raw_black_talc"], "properties": [{"property": "相转变起始温度", "value": "900°C", "condition": "空气气氛，DSC 920.7°C 吸热谷", "source_papers": ["PAPER-005"]}, {"property": "完全转变温度", "value": "1000°C", "condition": "滑石 XRD 反射完全消失，CI→0", "source_papers": ["PAPER-005"]}, {"property": "BET（T1000 产物）", "value": "5.3 m²/g", "condition": "1000°C 煅烧后", "source_papers": ["PAPER-005"]}, {"property": "粒径（T1000 产物）", "value": "32.78 μm", "condition": "激光粒度", "source_papers": ["PAPER-005"]}, {"property": "产物白度", "value": "显著提升（有机碳去除+相转变）", "condition": ">900°C", "source_papers": ["PAPER-005"]}, {"property": "介电常数 εr", "value": "5-7", "condition": "烧结顽火辉石陶瓷", "source_papers": ["PAPER-002", "PAPER-004"]}, {"property": "Q×f 范围", "value": "56,782 - 145,846 GHz", "condition": "Cu²⁺/Co²⁺ 掺杂优化后", "source_papers": ["PAPER-002", "PAPER-010", "PAPER-011"]}], "notes": "T1000 产物仍保持 4.0nm 介孔结构", "source_papers": ["PAPER-005"], "papers_cross_validated": ["PAPER-002"]}, "raw_black_talc": {"id": "raw_black_talc", "name": "黑滑石原矿", "name_en": "Raw Black Talc Ore", "formula": "Mg₃Si₄O₁₀(OH)₂ + <1%C", "type": "raw_material", "depth": 0, "children": ["dehydrated_talc", "decarbonized_talc", "dehydroxylated_talc", "enstatite_from_talc", "forsterite_from_talc", "separated_mgo", "separated_sio2"], "parents": [], "composition": {"SiO₂": "58-62%", "MgO": "26-30%", "CaO": "2-3%", "Al₂O₃": "0.2-2%", "Fe₂O₃": "0.1-1.5%", "C (TOC)": "<1%", "LOI": "6-8%"}, "source_papers": ["PAPER-002", "PAPER-013", "PAPER-014", "PAPER-020", "PAPER-022"], "notes": "广丰超 10 亿吨矿床，世界最大黑滑石矿床。TOT 层间含类石墨烯碳层。矿石类型：鲕粒状/片理化/角砾状。"}, "forsterite_from_talc": {"id": "forsterite_from_talc", "name": "镁橄榄石（滑石热解产物）", "name_en": "Forsterite (from Talc Decomposition)", "formula": "Mg₂SiO₄", "type": "intermediate_phase", "depth": 1, "children": ["refractory_brick"], "parents": ["raw_black_talc"], "properties": [{"property": "耐火度", "value": ">1500°C", "condition": "高温煅烧产物", "source_papers": ["PAPER-002"]}], "notes": "综述引用：黑滑石→镁橄榄石耐火材料，需更高煅烧温度（>1100°C）", "source_papers": ["PAPER-002"]}, "separated_mgo": {"id": "separated_mgo", "name": "高纯氧化镁（分离产物）", "name_en": "High-Purity MgO (Separated)", "formula": "MgO", "type": "intermediate_phase", "depth": 1, "children": ["mg_chemicals", "refractory_mgo"], "parents": ["raw_black_talc"], "properties": [{"property": "Mg 浸出率", "value": "最高 97.98%", "condition": "HF+HCl 混合酸浸 (PAPER-007)", "source_papers": ["PAPER-007"]}], "notes": "酸浸分离路线", "source_papers": ["PAPER-002"]}, "separated_sio2": {"id": "separated_sio2", "name": "高纯二氧化硅（分离产物）", "name_en": "High-Purity SiO₂ (Separated)", "formula": "SiO₂", "type": "intermediate_phase", "depth": 1, "children": ["white_carbon_black"], "parents": ["raw_black_talc"], "properties": [{"property": "SiO₂ 纯度", "value": "最高 99.92%", "condition": "HF+HCl 混合酸浸后残渣 (PAPER-007)", "source_papers": ["PAPER-007"]}], "notes": "酸浸分离路线——白炭黑前驱体", "source_papers": ["PAPER-002"]}}, "edges": {"e0001": {"from": "raw_black_talc", "to": "dehydrated_talc", "type": "process", "label_short": "30-165°C 脱水", "conditions": {"temperature": {"min": 30, "max": 165, "unit": "°C"}, "atmosphere": "空气", "time": "120min (保温)", "additives": [], "equipment": "马弗炉"}, "result_purity": "表面吸附水脱除，质量损失 0.32%", "source_papers": ["PAPER-005"], "trl": 2, "notes": "阶段 I / 四阶段模型", "papers_cross_validated": ["PAPER-002"]}, "e0002": {"from": "raw_black_talc", "to": "decarbonized_talc", "type": "process", "label_short": "165-580°C 有机碳氧化", "conditions": {"temperature": {"min": 165, "max": 580, "unit": "°C"}, "atmosphere": "空气", "time": "120min (保温)", "additives": [], "equipment": "马弗炉"}, "result_purity": "有机碳氧化为 CO₂，质量损失 0.65%，白度提升", "source_papers": ["PAPER-005"], "trl": 2, "notes": "阶段 II / 四阶段模型", "papers_cross_validated": ["PAPER-002"]}, "e0003": {"from": "raw_black_talc", "to": "dehydroxylated_talc", "type": "process", "label_short": "800-900°C 脱羟基活化", "conditions": {"temperature": {"min": 800, "max": 900, "unit": "°C"}, "atmosphere": "空气", "time": "120min (保温)", "additives": [], "equipment": "马弗炉"}, "result_purity": "脱羟基导致结构非晶化，CI 降至 51%，无定形含量增加", "source_papers": ["PAPER-005"], "trl": 2, "notes": "阶段 III / 四阶段模型 / '活化窗口'——表面功能化最佳区间", "papers_cross_validated": ["PAPER-002"]}, "e0004": {"from": "raw_black_talc", "to": "enstatite_from_talc", "type": "process", "label_short": "900-1000°C 相转变→顽火辉石", "conditions": {"temperature": {"min": 900, "max": 1000, "unit": "°C"}, "atmosphere": "空气", "time": "120min (保温)", "additives": [], "equipment": "马弗炉"}, "result_purity": "完全转变为顽火辉石 MgSiO₃，白度最高", "source_papers": ["PAPER-005"], "trl": 2, "notes": "阶段 IV / 四阶段模型 / DSC 920.7°C 吸热谷", "papers_cross_validated": ["PAPER-002"]}, "e0005": {"from": "raw_black_talc", "to": "forsterite_from_talc", "type": "process", "label_short": ">1100°C→镁橄榄石", "conditions": {"temperature": {"min": 1100, "max": 1400, "unit": "°C"}, "atmosphere": "空气", "additives": [], "equipment": "高温窑炉"}, "result_purity": "镁橄榄石主晶相", "source_papers": ["PAPER-002"], "trl": 5, "notes": "综述引用——镁橄榄石耐火材料路线"}, "e0006": {"from": "forsterite_from_talc", "to": "refractory_brick", "type": "property_link", "label_short": "高耐火度→耐火砖", "via_property": "耐火度 >1500°C + 低热膨胀系数", "source_papers": ["PAPER-002"], "trl": 7, "notes": "镁橄榄石耐火砖——已有工业应用"}}};
const EDGES_BY_TARGET = {};

(function() {
  const edges = TREE_DATA.edges || {};
  for (const [eid, edge] of Object.entries(edges)) {
    if (!EDGES_BY_TARGET[edge.to]) EDGES_BY_TARGET[edge.to] = [];
    EDGES_BY_TARGET[edge.to].push(edge);
  }
})();

// ===== BUILD HIERARCHY FROM TREE DATA =====
function buildHierarchy() {
  const nodes = TREE_DATA.nodes || {};
  const edges = TREE_DATA.edges || {};

  // Find root
  let rootId = null;
  for (const [id, node] of Object.entries(nodes)) {
    if (node.type === "raw_material") { rootId = id; break; }
  }
  if (!rootId) {
    for (const [id, node] of Object.entries(nodes)) {
      if (node.depth === 0) { rootId = id; break; }
    }
  }
  if (!rootId && Object.keys(nodes).length > 0) {
    rootId = Object.keys(nodes)[0];
  }

  if (!rootId) return null;

  function buildChildren(parentId) {
    const children = [];
    for (const [eid, edge] of Object.entries(edges)) {
      if (edge.from === parentId && nodes[edge.to]) {
        const child = Object.assign({}, nodes[edge.to]);
        child._incomingEdge = edge;
        child._incomingEdgeId = eid;
        child.children = buildChildren(edge.to);
        children.push(child);
      }
    }
    return children;
  }

  const root = Object.assign({}, nodes[rootId]);
  root._incomingEdge = null;
  root.children = buildChildren(rootId);
  return root;
}

// ===== RENDER TREE =====
const root = buildHierarchy();
if (!root) {
  document.getElementById("tree-panel").innerHTML =
    '<div class="empty-state" style="margin-top:120px;">树为空，请先通过 ingest.py 注册论文</div>';
} else {
  const svg = d3.select("#tree-panel svg");
  const g = svg.append("g").attr("transform", "translate(60, 60)");

  const treeLayout = d3.tree().size([window.innerHeight - 120, 0]);

  const hierarchy = d3.hierarchy(root);
  hierarchy.descendants().forEach(d => {
    // Horizontal spacing
    d._depth = d.depth;
  });

  // Set horizontal positions based on depth
  const maxDepth = d3.max(hierarchy.descendants(), d => d.depth) || 1;
  const panelWidth = () => document.getElementById("tree-panel").clientWidth;

  hierarchy.descendants().forEach(d => {
    d.y = (d.depth / Math.max(maxDepth, 1)) * (panelWidth() - 120);
  });

  const treeData = treeLayout(hierarchy);

  // Draw links
  const link = g.selectAll(".link")
    .data(treeData.links())
    .join("path")
    .attr("class", d => "link " + (d.target.data._incomingEdge ? d.target.data._incomingEdge.type : ""))
    .attr("d", d => {
      return "M" + d.source.y + "," + d.source.x
        + "C" + (d.source.y + d.target.y) / 2 + "," + d.source.x
        + " " + (d.source.y + d.target.y) / 2 + "," + d.target.x
        + " " + d.target.y + "," + d.target.x;
    });

  // Edge labels
  g.selectAll(".edge-label")
    .data(treeData.links())
    .join("text")
    .attr("class", "edge-label")
    .attr("x", d => (d.source.y + d.target.y) / 2)
    .attr("y", d => (d.source.x + d.target.x) / 2 - 8)
    .attr("text-anchor", "middle")
    .text(d => d.target.data._incomingEdge ? d.target.data._incomingEdge.label_short || "" : "");

  // Draw nodes
  const node = g.selectAll(".node")
    .data(treeData.descendants())
    .join("g")
    .attr("class", d => "node " + (d.data.type || ""))
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click", (event, d) => showDetail(d.data));

  node.append("circle");

  node.append("text")
    .attr("dy", "0.31em")
    .attr("x", d => d.children && d.children.length > 0 ? -12 : 12)
    .attr("text-anchor", d => d.children && d.children.length > 0 ? "end" : "start")
    .text(d => d.data.name || d.data.id || "")
    .clone(true).lower()
    .attr("stroke", "white").attr("stroke-width", 3);
}

// ===== DETAIL PANEL =====
function showDetail(nodeData) {
  const panel = document.getElementById("detail-panel");
  let html = "";

  const typeLabels = {
    raw_material: "原料",
    intermediate_phase: "中间物相",
    product: "产品",
    byproduct: "副产品"
  };
  const typeClass = {
    raw_material: "tag-raw",
    intermediate_phase: "tag-phase",
    product: "tag-product",
    byproduct: "tag-byproduct"
  };

  html += '<h2>' + (nodeData.name || nodeData.id) +
    ' <span class="tag ' + (typeClass[nodeData.type] || "tag-phase") + '">' +
    (typeLabels[nodeData.type] || nodeData.type) + '</span></h2>';

  if (nodeData.formula) {
    html += '<p style="color:#7f8c8d;font-size:14px;">' + nodeData.formula + '</p>';
  }
  if (nodeData.name_en) {
    html += '<p style="color:#95a5a6;font-size:12px;">' + nodeData.name_en + '</p>';
  }

  // Properties
  if (nodeData.properties && nodeData.properties.length > 0) {
    html += '<div class="section"><h3>性质数据 (' + nodeData.properties.length + ' 条)</h3>';
    html += '<table><thead><tr><th>性质</th><th>数值</th><th>来源</th></tr></thead><tbody>';
    for (const p of nodeData.properties) {
      const sources = (p.source_papers || []).map(s => '<span class="paper-badge">' + s + '</span>').join(" ");
      html += '<tr><td>' + (p.property || "") +
        (p.condition ? '<br><small style="color:#7f8c8d;">' + p.condition + '</small>' : '') +
        '</td><td><strong>' + (p.value || "") + '</strong></td><td>' + sources + '</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  // Composition
  if (nodeData.composition && Object.keys(nodeData.composition).length > 0) {
    html += '<div class="section"><h3>化学组成</h3><table><thead><tr><th>组分</th><th>含量</th></tr></thead><tbody>';
    for (const [k, v] of Object.entries(nodeData.composition)) {
      html += '<tr><td>' + k + '</td><td>' + v + '</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  // Incoming edges
  const incomingEdges = EDGES_BY_TARGET[nodeData.id] || [];
  if (incomingEdges.length > 0) {
    html += '<div class="section"><h3>入边（如何到达此节点）</h3>';
    for (const e of incomingEdges) {
      const srcName = (TREE_DATA.nodes[e.from] || {}).name || e.from;
      html += '<p style="font-size:13px;margin:4px 0;">' +
        '<strong>' + (e.label_short || "") + '</strong> ' +
        '<span style="color:#7f8c8d;">← ' + srcName + '</span> ' +
        (e.source_papers || []).map(s => '<span class="paper-badge">' + s + '</span>').join(" ") +
        '</p>';
    }
    html += '</div>';
  }

  // Source papers
  if (nodeData.source_papers && nodeData.source_papers.length > 0) {
    html += '<div class="section"><h3>论文来源</h3><p>';
    for (const p of nodeData.source_papers) {
      html += '<span class="paper-badge">' + p + '</span> ';
    }
    html += '</p></div>';
  }

  // Notes
  if (nodeData.notes) {
    html += '<div class="section"><h3>备注</h3><p style="font-size:13px;color:#7f8c8d;">' + nodeData.notes + '</p></div>';
  }

  // Meta
  html += '<div style="margin-top:20px;font-size:11px;color:#bdc3c7;">' +
    '节点ID: ' + (nodeData.id || "?") +
    ' | depth: ' + (nodeData.depth || "?") +
    ' | 论文: ' + (nodeData.source_papers || []).length + ' 篇' +
    ' | 性质: ' + (nodeData.properties || []).length + ' 条' +
    '</div>';

  panel.innerHTML = html;
}

// ===== RESPONSIVE =====
window.addEventListener("resize", () => {
  location.reload();
});
</script>
</body>
</html>
